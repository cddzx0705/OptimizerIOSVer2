function createDevice(){
let id="SYS-"+Date.now()+"-"+Math.random().toString(36).substr(2,6);
localStorage.setItem("SYSTEMIOS_DEVICE",id);
return id;
}

/* ================= CHECK KEY ================= */
async function checkKey(key, auto = false) {
    const status = document.getElementById("status");
    const loader = document.getElementById("loader");
    const btn = document.getElementById("loginBtn");

    if (!auto) {
        loader.style.display = "block";
        btn.disabled = true;
    }
    status.innerText = "Checking key...";

    try {
        const res = await fetch(SERVER_URL + "checkKey", { // Đã sửa đường dẫn URL
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                key: key,
                deviceId: deviceId
            })
        });

        const data = await res.json();

        loader.style.display = "none";
        btn.disabled = false;

        if (data.success) {
            status.innerText = "✅ Login success";
            localStorage.setItem("SYSTEMIOS_KEY", key);

            /* LOAD MENU */
            setTimeout(() => {
                showMenu(data.daysLeft);
startKeyTimer(data.expireAt, data.serverTime);
                startGalaxy();
            }, 700);
        } else {
            status.innerText = "❌ " + (data.message || "Key không hợp lệ");
            localStorage.removeItem("SYSTEMIOS_KEY");
        }

    } catch (e) {
        console.error("Lỗi kết nối server:", e);
        loader.style.display = "none";
        btn.disabled = false;
        status.innerText = "❌ Không thể kết nối đến Server";
    }
}

(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000
);

}

geometry.setAttribute(
"position",
new THREE.Float32BufferAttribute(vertices,3)
);

const material = new THREE.PointsMaterial({ size:1.4, color:0xffffff });


const stars = new THREE.Points(geometry,material);
scene.add(stars);

camera.position.z = 5;

stars.rotation.y += 0.0005;

renderer.render(scene,camera);
}

animate();

function startKeyTimer(expireAt, serverTime){

const statusBar = document.getElementById("sysStatus");

const offset = Date.now() - serverTime;

function update(){

const now = Date.now() - offset;
let sec = Math.floor((expireAt - now)/1000);

if(sec <= 0){
statusBar.innerHTML = "❌ Key Expired";
return;
}

let d=Math.floor(sec/86400);
let h=Math.floor((sec%86400)/3600);
let m=Math.floor((sec%3600)/60);
let s=sec%60;

const sys = window.SYSTEM_STATUS || {};

statusBar.innerHTML =
`
🔑 ${d}d ${h}h ${m}m ${s}s`;

}

update();
setInterval(update,1000);

}
